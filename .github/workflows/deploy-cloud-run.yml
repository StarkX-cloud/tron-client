name: Deploy TRON to Google Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GCP_REGION: us-central1
  CLOUD_RUN_SERVICE: tron-core
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT }}/tron-core:latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: '${{ secrets.GCP_PROJECT }}'
          export_default_credentials: true

      - name: Build and push container
        run: |
          gcloud builds submit --tag "${{ env.IMAGE }}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.CLOUD_RUN_SERVICE }}" \
            --image "${{ env.IMAGE }}" \
            --platform managed \
            --region "${{ env.GCP_REGION }}" \
            --allow-unauthenticated \
            --port 9000 \
            --update-env-vars TRON_HOST=0.0.0.0,TRON_PORT=9000,TRON_RELOAD=false
